[plugin]
name = "My Plugin"
description = "A qol-tray plugin"


version = "0.1.0"

author = ""
platforms = ["linux", "macos"]

[runtime]
command = "plugin-template"
actions = { run = ["run"], settings = ["settings"] }

[menu]
label = "My Plugin"
items = [
    { type = "action", id = "run", label = "Run", action = "run" },
    { type = "action", id = "settings", label = "Settings", action = "settings" },
]

[[dependencies.binaries]]
name = "plugin-template"
repo = "qol-tools/plugin-template"
pattern = "plugin-template-{os}-{arch}"
